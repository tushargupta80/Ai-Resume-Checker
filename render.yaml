services:
  - type: web
    name: ai-resume-analyzer-backend
    runtime: node
    rootDir: backend
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /api/health
    envVars:
      - key: NODE_VERSION
        value: 20
      - key: PORT
        value: 10000
      - key: MONGO_URI
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: JWT_EXPIRES_IN
        value: 7d
      - key: CLIENT_URL
        sync: false
      - key: GROK_API_KEY
        sync: false
      - key: GROK_BASE_URL
        value: https://api.x.ai/v1
      - key: GROK_MODEL
        value: grok-2-latest
